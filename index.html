}

function RadarChart({ scores, categories }) {
  const size = 260, cx = size/2, cy = size/2, r = 100;
  const n = categories.length;
  const points = (radius) => categories.map((_, i) => {
    const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    return [cx + radius * Math.cos(angle), cy + radius * Math.sin(angle)];
  });
  const polygon = (pts) => pts.map(p => p.join(",")).join(" ");
  const scorePoints = categories.map((_, i) => {
    const angle = (Math.PI * 2 * i) / n - Math.PI / 2;
    const val = (scores[i] / 3) * r;
    return [cx + val * Math.cos(angle), cy + val * Math.sin(angle)];
  });

  return (
    <svg viewBox={`0 0 ${size} ${size}`} style={{ width: "100%", maxWidth: 300 }}>
      {[0.25, 0.5, 0.75, 1].map((f, i) => (
        <polygon key={i} points={polygon(points(r * f))} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth={0.5} />
      ))}
      {points(r).map((p, i) => (
        <line key={i} x1={cx} y1={cy} x2={p[0]} y2={p[1]} stroke="rgba(255,255,255,0.08)" strokeWidth={0.5} />
      ))}
      <polygon points={polygon(scorePoints)} fill="rgba(0,151,209,0.2)" stroke="#0097d1" strokeWidth={2} />
      {scorePoints.map((p, i) => (
        <circle key={i} cx={p[0]} cy={p[1]} r={4} fill={MATURITY_COLORS[scores[i]]} stroke="#fff" strokeWidth={1.5} />
      ))}
      {points(r + 18).map((p, i) => (
        <text key={i} x={p[0]} y={p[1]} textAnchor="middle" dominantBaseline="middle" fill="rgba(255,255,255,0.6)" fontSize={8} fontWeight={600}>
          {categories[i].length > 12 ? categories[i].slice(0,11) + "…" : categories[i]}
        </text>
      ))}
    </svg>
  );
}

  const toggleStrategy = (id) => {
    setSelectedStrategies(prev =>
      prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
    );
  };

  const filteredRelations = RELATIONS.filter(rel => {
    if (selectedStrategies.length === 0) return true;
    if (selectedStrategies.length === 1) return rel.a === selectedStrategies[0] || rel.b === selectedStrategies[0];
    return selectedStrategies.includes(rel.a) && selectedStrategies.includes(rel.b);
  });

  const conflicts = filteredRelations.filter(r => r.type === "conflict");
  const synergies = filteredRelations.filter(r => r.type === "synergy");

  // Assessment scoring
  const categoryScores = {};
  const cats = [...new Set(ASSESSMENT_QUESTIONS.map(q => q.cat))];
  cats.forEach(cat => {
    const qs = ASSESSMENT_QUESTIONS.filter(q => q.cat === cat);
    const answered = qs.filter(q => answers[q.q] !== undefined);
    if (answered.length > 0) {
      categoryScores[cat] = Math.round(answered.reduce((sum, q) => sum + answers[q.q], 0) / answered.length);
    }
  });
  const allAnswered = Object.keys(answers).length === ASSESSMENT_QUESTIONS.length;
  const overallScore = allAnswered ? Math.round(Object.values(categoryScores).reduce((a,b) => a+b, 0) / cats.length) : null;

  const exportResults = () => {
    const now = new Date().toLocaleDateString("de-DE", { year: "numeric", month: "long", day: "numeric" });
    const empfehlungen = {
      0: "Ihre Behörde steht am Anfang der digitalen Transformation. Empfehlung: Starten Sie mit digitalen Grundkompetenzen und Cybersicherheitssensibilisierung.",
      1: "Einzelne Bereiche sind auf dem Weg. Empfehlung: Systematisieren Sie die Fortbildung und etablieren Sie Change Management bei Digitalisierungsvorhaben.",
      2: "Gute Grundlagen vorhanden. Empfehlung: Vertiefen Sie KI-Kompetenz, Open-Source-Readiness und bauen Sie systematisches Innovationsmanagement auf.",
      3: "Ihr Reifegrad ist hoch. Empfehlung: Teilen Sie Ihre Erfahrungen, wirken Sie als Vorbild und treiben Sie die Kooperation im HSF/SIVIM-SID-Dreieck voran."
    };
    const detailRows = ASSESSMENT_QUESTIONS.map(q => {
      const val = answers[q.q];
      const source = STRATEGIES.find(s => s.id === q.strategy)?.short || "";

        <td style="padding:8px 10px;border-bottom:1px solid #e0e0e0;font-size:13px;color:#333">${q.cat}</td>
        <td style="padding:8px 10px;border-bottom:1px solid #e0e0e0;font-size:12px;color:#555">${q.q}</td>
        <td style="padding:8px 10px;border-bottom:1px solid #e0e0e0;font-size:12px;text-align:center;font-weight:700;color:${val !== undefined ? MATURITY_COLORS[val] : '#999'}">${val !== undefined ? MATURITY_LABELS[val] : "—"}</td>
        <td style="padding:8px 10px;border-bottom:1px solid #e0e0e0;font-size:11px;color:#777">${val !== undefined ? q.levels[val] : "—"}</td>
        <td style="padding:8px 10px;border-bottom:1px solid #e0e0e0;font-size:11px;color:#999">${source}</td>
      </tr>`;
    }).join("");
    const catSummary = cats.map(cat => {
      const sc = categoryScores[cat];
      return `<tr>
        <td style="padding:6px 10px;font-weight:600;font-size:13px">${cat}</td>
        <td style="padding:6px 10px;text-align:center;font-weight:700;color:${sc !== undefined ? MATURITY_COLORS[sc] : '#999'}">${sc !== undefined ? `Stufe ${sc+1}: ${MATURITY_LABELS[sc]}` : "—"}</td>

    <body>
      <h1>Reifegrad-Ergebnis: Digitale Transformation</h1>
      <p class="meta"><strong>${behoerdeDisplay}</strong> · Erhoben am ${now}</p>
      ${overallScore !== null ? `<div class="overall">
        <div style="font-size:13px;color:#666;margin-bottom:4px">Gesamtreifegrad</div>
        <div style="font-size:26px;font-weight:700;color:${MATURITY_COLORS[overallScore]}">Stufe ${overallScore+1}: ${MATURITY_LABELS[overallScore]}</div>
        <div style="font-size:13px;color:#555;margin-top:8px">${empfehlungen[overallScore]}</div>

      <div class="footer">
        Erstellt mit dem Strategieportal Digitale Strategien Sachsen · Datengrundlage: Sieben Strategiepapiere des Freistaates Sachsen · Analyse: HSF Meißen
      </div>
      <script>window.onload=function(){window.print()}<\/script>
    </body></html>`;

            {conflicts.length > 0 && (

                }}>
                  <option value="" style={{ background: "#1a2236", color: "#ccc" }}>— Bitte auswählen —</option>
                  {BEHOERDEN.map(b => <option key={b} value={b} style={{ background: "#1a2236", color: "#fff" }}>{b}</option>)}
                </select>
                {needsDetail && (
                  <div style={{ marginTop: 10 }}>
                    <label style={{ fontSize: 12, fontWeight: 600, color: "rgba(255,255,255,0.5)", display: "block", marginBottom: 6 }}>Bezeichnung Ihrer Behörde</label>
                    <input type="text" value={behoerdeDetail} onChange={e => setBehoerdeDetail(e.target.value)}

            </div>

            {behoerde && (!needsDetail || behoerdeDetail) && (
              <div>
                {cats.map(cat => (
                  <div key={cat} style={{ marginBottom: 28 }}>

                      fontFamily: "'DM Sans', sans-serif", fontSize: 15, fontWeight: 700,

                      {cat}
                      <span style={{ fontSize: 10, fontWeight: 400, color: "rgba(255,255,255,0.3)", marginLeft: 8 }}>

                      </span>
                    </h3>
                    {ASSESSMENT_QUESTIONS.filter(q => q.cat === cat).map((q, qi) => (
                      <div key={qi} style={{ marginBottom: 18, paddingLeft: 12, borderLeft: `2px solid ${answers[q.q] !== undefined ? MATURITY_COLORS[answers[q.q]] : "rgba(255,255,255,0.06)"}` }}>

            {(!behoerde || (needsDetail && !behoerdeDetail)) && (
              <div style={{ textAlign: "center", padding: 60, color: "rgba(255,255,255,0.25)" }}>
                {!behoerde ? "Bitte wählen Sie zunächst Ihre Behörde aus, um mit der Einschätzung zu beginnen." : "Bitte geben Sie die Bezeichnung Ihrer Behörde ein."}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
</html>
